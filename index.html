<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fully Booked | Online Reservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-white">

    <header class="hidden lg:block border-b sticky top-0 bg-white z-50">
        <div class="max-w-[1400px] mx-auto px-6 py-4 flex items-center gap-10">
            <h1 class="text-3xl font- tracking-tighter text-blue-700 cursor-pointer">FULLY BOOKED</h1>
            <nav class="flex gap-8 text-[11px] font-bold uppercase tracking-widest text-gray-600">
                <a href="#" class="hover:text-blue-600">New Arrivals</a>
                <a href="#" class="hover:text-blue-600">Bestsellers</a>
                <a href="#" class="hover:text-blue-600">Pre-Order</a>
            </nav>
            <div class="flex-grow relative">
                <input type="text" id="desktopSearch" onkeyup="filterBooks()" placeholder="Search by Title or Author..." class="w-full border border-gray-200 rounded-sm py-2.5 px-10 text-sm focus:border-blue-500 outline-none transition-all">
                <svg class="w-4 h-4 absolute left-4 top-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <div class="flex items-center gap-6 font-bold text-xs">
                <button class="hover:text-blue-600">WISH LIST</button>
                <button class="hover:text-blue-600 uppercase">Login</button>
            </div>
        </div>
    </header>

    <header class="lg:hidden sticky top-0 bg-white border-b z-50 px-4 py-3">
        <div class="flex items-center justify-between mb-3">
            <h1 class="text-xl font- tracking-tighter text-blue-700">FULLY BOOKED</h1>
            <div class="flex gap-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            </div>
        </div>
        <div class="relative">
            <input type="text" id="mobileSearch" onkeyup="filterBooks()" placeholder="Search books..." class="w-full bg-gray-100 rounded-full py-2 px-10 text-sm focus:outline-none border-none">
            <svg class="w-4 h-4 absolute left-4 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-4 lg:px-6 py-6 pb-24">
        
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg lg:text-2xl font-extrabold uppercase tracking-tight">Available for Reservation</h2>
            <div class="h-px bg-gray-200 flex-grow mx-4 hidden sm:block"></div>
            <span id="book-count" class="text-xs font-bold text-gray-400">LOADING...</span>
        </div>

        <div id="book-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-4 gap-y-8 lg:gap-x-8 lg:gap-y-12">
            <div class="animate-pulse"><div class="aspect-[2/3] bg-gray-200 rounded mb-3"></div><div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div><div class="h-4 bg-gray-200 rounded w-1/2"></div></div>
            <div class="animate-pulse"><div class="aspect-[2/3] bg-gray-200 rounded mb-3"></div><div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div><div class="h-4 bg-gray-200 rounded w-1/2"></div></div>
            <div class="animate-pulse"><div class="aspect-[2/3] bg-gray-200 rounded mb-3"></div><div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div><div class="h-4 bg-gray-200 rounded w-1/2"></div></div>
            <div class="animate-pulse"><div class="aspect-[2/3] bg-gray-200 rounded mb-3"></div><div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div><div class="h-4 bg-gray-200 rounded w-1/2"></div></div>
        </div>
    </main>

    <nav class="lg:hidden fixed bottom-0 w-full bg-white border-t flex justify-around py-3 px-2 z- shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button class="flex flex-col items-center text-blue-700">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[10px] font-bold mt-1 uppercase">Home</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            <span class="text-[10px] font-bold mt-1 uppercase">Browse</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span class="text-[10px] font-bold mt-1 uppercase">Account</span>
        </button>
    </nav>

    <script>
        // 1. CONFIGURATION: Paste your Web App URL from Google Sheets here
        const API_URL = "https://script.google.com/macros/s/AKfycbx_t2sre1s5rtwNhUx2RWu8cG-mIpBXGGUpK8t1wr18MFtTa4DH75L-lX-trPOy32TbqA/exec";
        let allBooks = [];

        async function fetchBooks() {
            try {
                const response = await fetch(API_URL);
                allBooks = await response.json();
                renderBooks(allBooks);
            } catch (err) {
                console.error("Failed to load books", err);
                document.getElementById('book-grid').innerHTML = "<p class='col-span-full text-center py-10'>Error loading books. Please check API connection.</p>";
            }
        }

        function renderBooks(data) {
            const grid = document.getElementById('book-grid');
            const countLabel = document.getElementById('book-count');
            grid.innerHTML = '';
            countLabel.innerText = `${data.length} ITEMS`;

            data.forEach(book => {
                const srp = parseFloat(book.SRP || 0);
                const price = parseFloat(book.PRICE || 0);
                const hasPromo = book.PROMO_FLAG === "TRUE";

                grid.innerHTML += `
                    <div class="group flex flex-col h-full">
                        <div class="relative aspect-[2/3] bg-gray-100 rounded-sm overflow-hidden mb-4 shadow-sm group-hover:shadow-md transition-shadow">
                            <img src="${book.COVER_IMAGE_Front_URL}" 
                                 alt="${book.TITLE}" 
                                 loading="lazy"
                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                            ${hasPromo ? `<span class="absolute top-2 left-2 bg-red-600 text-white text-[10px] font-black px-2 py-1 uppercase italic">Sale</span>` : ''}
                        </div>
                        <div class="flex flex-col flex-grow">
                            <h3 class="text-[13px] font-extrabold uppercase leading-tight line-clamp-2 mb-1 group-hover:text-blue-700 transition-colors">${book.TITLE}</h3>
                            <p class="text-[11px] text-gray-400 mb-3 uppercase tracking-tighter">${book.AUTHOR}</p>
                            <div class="mt-auto">
                                <div class="flex items-center gap-2 mb-3">
                                    <span class="text-blue-700 font-bold text-sm">₱${price.toLocaleString()}</span>
                                    ${hasPromo ? `<span class="text-[11px] text-gray-400 line-through">₱${srp.toLocaleString()}</span>` : ''}
                                </div>
                                <button class="w-full bg-white border-2 border-blue-700 text-blue-700 py-2 text-[10px] font-black uppercase tracking-widest hover:bg-blue-700 hover:text-white transition-all active:scale-95">
                                    Reserve
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filterBooks() {
            const query = (window.innerWidth >= 1024 ? 
                document.getElementById('desktopSearch').value : 
                document.getElementById('mobileSearch').value).toLowerCase();
            
            const filtered = allBooks.filter(b => 
                b.TITLE.toLowerCase().includes(query) || 
                b.AUTHOR.toLowerCase().includes(query)
            );
            renderBooks(filtered);
        }

        // Run on load
        fetchBooks();
    </script>
</body>
</html>
