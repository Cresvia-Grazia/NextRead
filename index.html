<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fully Booked Clone | Book Reservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fully Booked typical font feel */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white text-gray-900">

    <header class="lg:hidden sticky top-0 bg-white border-b z-50 p-4">
        <div class="flex items-center justify-between mb-3">
            <span class="text-xl font-black tracking-tighter text-blue-700">FULLY BOOKED</span>
            <button class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"></path></svg></button>
        </div>
        <div class="relative">
            <input type="text" placeholder="Search for books..." class="w-full bg-gray-100 rounded-full py-2 px-10 text-sm focus:outline-none">
            <svg class="w-4 h-4 absolute left-4 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
    </header>

    <header class="hidden lg:block border-b sticky top-0 bg-white z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center gap-12">
            <span class="text-3xl font-black tracking-tighter text-blue-700">FULLY BOOKED</span>
            <nav class="flex gap-6 text-sm font-semibold uppercase tracking-widest">
                <a href="#" class="hover:text-blue-600">New Arrivals</a>
                <a href="#" class="hover:text-blue-600">Bestsellers</a>
                <a href="#" class="hover:text-blue-600">Sale</a>
            </nav>
            <div class="flex-grow relative">
                <input type="text" placeholder="Search by Title, Author, or ISBN..." class="w-full border-2 border-gray-100 rounded-lg py-2 px-11 focus:border-blue-500 outline-none">
                <svg class="w-5 h-5 absolute left-4 top-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <div class="flex gap-4">
                <button class="font-bold text-sm">LOGIN</button>
                <div class="bg-blue-600 text-white p-2 rounded-full relative">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span class="absolute -top-1 -right-1 bg-red-500 text-[10px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 lg:px-6 py-8">
        <div class="w-full h-48 lg:h-80 bg-blue-100 rounded-2xl mb-8 flex items-center justify-center overflow-hidden">
             <img src="https://via.placeholder.com/1200x400?text=Summer+Reading+Promo" class="w-full h-full object-cover" alt="Promo">
        </div>

        <div class="flex justify-between items-end mb-6">
            <h2 class="text-xl lg:text-2xl font-bold">Recommended For You</h2>
            <a href="#" class="text-blue-600 text-sm font-bold">View All</a>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 lg:gap-8">
            <div class="group cursor-pointer">
                <div class="relative aspect-[2/3] bg-gray-100 rounded-lg overflow-hidden mb-3 shadow-sm group-hover:shadow-xl transition-all duration-300">
                    <img src="https://via.placeholder.com/300x450?text=Book+Cover" class="w-full h-full object-cover group-hover:scale-105 transition-transform" alt="Book">
                    <span class="absolute top-2 left-2 bg-red-600 text-white text-[10px] font-bold px-2 py-1 rounded">20% OFF</span>
                </div>
                <h3 class="text-sm font-bold line-clamp-2 leading-tight">The Art of Creative Thinking</h3>
                <p class="text-xs text-gray-500 mb-2">Author Name</p>
                <div class="flex flex-col lg:flex-row lg:items-center gap-1">
                    <span class="text-blue-700 font-bold">₱799.00</span>
                    <span class="text-xs text-gray-400 line-through font-medium">₱999.00</span>
                </div>
                <button class="w-full mt-3 bg-white border border-blue-600 text-blue-600 py-2 rounded text-xs font-bold hover:bg-blue-600 hover:text-white transition-colors">RESERVE</button>
            </div>
            </div>
    </main>

    <nav class="lg:hidden fixed bottom-0 w-full bg-white border-t flex justify-around py-3 z-50">
        <button class="flex flex-col items-center text-blue-600">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[10px] font-bold">Home</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            <span class="text-[10px] font-bold">Categories</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span class="text-[10px] font-bold">Reserve</span>
        </button>
    </nav>

</body>
</html>
