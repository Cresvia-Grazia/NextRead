<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fully Booked | Reserve</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-white">

    <nav class="hidden lg:flex border-b p-4 justify-between items-center px-10 sticky top-0 bg-white z-50">
        <h1 class="text-2xl font-black text-blue-700 tracking-tighter">FULLY BOOKED</h1>
        <div class="flex-grow max-w-xl mx-10">
            <input type="text" id="d-search" onkeyup="search()" placeholder="Search Title or Author..." class="w-full border p-2 rounded-sm text-sm outline-blue-500">
        </div>
        <div class="text-xs font-bold space-x-6"><span>WISHLIST</span><span>LOGIN</span></div>
    </nav>

    <nav class="lg:hidden p-4 border-b sticky top-0 bg-white z-50">
        <h1 class="text-xl font-black text-blue-700 tracking-tighter mb-3">FULLY BOOKED</h1>
        <input type="text" id="m-search" onkeyup="search()" placeholder="Search..." class="w-full bg-gray-100 p-2 rounded-full text-sm outline-none">
    </nav>

    <main class="max-w-[1400px] mx-auto p-4 lg:p-10">
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            <div class="animate-pulse bg-gray-100 aspect-[2/3]"></div>
            <div class="animate-pulse bg-gray-100 aspect-[2/3]"></div>
        </div>
    </main>

    <div class="lg:hidden fixed bottom-0 w-full bg-white border-t flex justify-around py-3 font-bold text-[10px] text-gray-400">
        <div class="text-blue-700">HOME</div>
        <div>BROWSE</div>
        <div>RESERVE</div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbx_t2sre1s5rtwNhUx2RWu8cG-mIpBXGGUpK8t1wr18MFtTa4DH75L-lX-trPOy32TbqA/exec"; // PASTE YOUR URL HERE
        let books = [];

        async function load() {
            try {
                const res = await fetch(API);
                books = await res.json();
                render(books);
            } catch (e) {
                document.getElementById('grid').innerHTML = "API Error. Check Console.";
                console.error(e);
            }
        }

        function render(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(book => `
                <div class="group">
                    <div class="relative aspect-[2/3] bg-gray-100 overflow-hidden shadow-sm mb-3">
                        <img src="${book.COVER_IMAGE_Front_URL}" class="w-full h-full object-cover group-hover:scale-105 transition">
                        ${book.PROMO_FLAG == "TRUE" ? '<span class="absolute top-2 left-2 bg-red-600 text-white text-[10px] px-2 py-1 font-bold italic">SALE</span>' : ''}
                    </div>
                    <h3 class="text-xs font-bold uppercase line-clamp-2 h-8">${book.TITLE || 'Untitled'}</h3>
                    <p class="text-[10px] text-gray-400 mb-2">${book.AUTHOR || 'Unknown'}</p>
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-blue-700 font-bold text-sm">₱${Number(book.PRICE).toLocaleString()}</span>
                        ${book.PROMO_FLAG == "TRUE" ? `<span class="text-[10px] text-gray-400 line-through">₱${Number(book.SRP).toLocaleString()}</span>` : ''}
                    </div>
                    <button class="w-full border-2 border-blue-700 text-blue-700 py-1.5 text-[10px] font-black uppercase hover:bg-blue-700 hover:text-white transition">Reserve</button>
                </div>
            `).join('');
        }

        function search() {
            const val = (window.innerWidth > 1024 ? document.getElementById('d-search').value : document.getElementById('m-search').value).toLowerCase();
            const filtered = books.filter(b => b.TITLE.toLowerCase().includes(val) || b.AUTHOR.toLowerCase().includes(val));
            render(filtered);
        }

        load();
    </script>
</body>
</html>
