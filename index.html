<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fully Booked | Premium Books Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
        .fb-blue { color: #004f9f; }
        .bg-fb-blue { background-color: #004f9f; }
        .book-aspect { aspect-ratio: 2 / 3; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Subtle elevation effect */
        .book-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .book-card:hover { transform: translateY(-8px); }
        .book-card:hover .img-container { shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="text-gray-900">

    <header class="hidden lg:block bg-white border-b sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-6 py-4 flex items-center gap-12">
            <h1 class="text-3xl font- tracking-tighter fb-blue shrink-0">FULLY BOOKED</h1>
            
            <div class="flex-grow">
                <div class="relative group">
                    <input type="text" id="desktopSearch" onkeyup="searchBooks()" 
                           placeholder="Search by Title, Author, or Category..." 
                           class="w-full bg-gray-100 border-transparent border-2 py-2.5 px-12 rounded-full focus:bg-white focus:border-blue-600 focus:ring-0 outline-none transition-all text-sm">
                    <svg class="w-5 h-5 absolute left-4 top-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <nav class="flex items-center gap-6 text-[11px] font-bold tracking-widest text-gray-600">
                <a href="#" class="hover:fb-blue transition-colors">WISHLIST</a>
                <a href="#" class="hover:fb-blue transition-colors">LOGIN</a>
                <div class="h-8 w-[1px] bg-gray-200"></div>
                <div class="relative">
                    <svg class="w-6 h-6 fb-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span class="absolute -top-1 -right-2 bg-red-600 text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full font-black">0</span>
                </div>
            </nav>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-4 lg:px-6 py-10">
        <div class="flex items-end justify-between mb-10">
            <div>
                <span class="text-blue-600 font-bold text-xs uppercase tracking-widest">New Arrivals</span>
                <h2 class="text-3xl font-black uppercase tracking-tighter">Fresh off the press</h2>
            </div>
            <div id="item-count" class="text-[11px] font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full">LOADING...</div>
        </div>

        <div id="book-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-x-6 gap-y-12">
            <div class="animate-pulse"><div class="book-aspect bg-gray-100 rounded-lg mb-4"></div><div class="h-3 bg-gray-100 w-3/4 mb-2"></div><div class="h-3 bg-gray-100 w-1/2"></div></div>
            <div class="animate-pulse"><div class="book-aspect bg-gray-100 rounded-lg mb-4"></div><div class="h-3 bg-gray-100 w-3/4 mb-2"></div><div class="h-3 bg-gray-100 w-1/2"></div></div>
        </div>
    </main>

    <script>
        const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbyYKJEK6jiCWB3YDwYM1kTuL9ObrPkrk0Ky5tOB9atg9_u1B7b8jrToQPQCucp69UR9Zg/exec";
        let allBooks = [];

        async function init() {
            try {
                const res = await fetch(API_ENDPOINT);
                allBooks = await res.json();
                render(allBooks);
            } catch (err) {
                console.error("Link Broken:", err);
                document.getElementById('item-count').innerText = "OFFLINE";
            }
        }

        function render(data) {
            const grid = document.getElementById('book-grid');
            document.getElementById('item-count').innerText = `${data.length} TITLES`;
            
            grid.innerHTML = data.map(book => {
                // We use the lowercase keys because of our Apps Script mapping
                const title = book.title || 'Untitled';
                const author = book.author || 'Unknown';
                const price = book.price || 0;
                const srp = book.srp || 0;
                const img = book.cover_image_front_url || 'https://via.placeholder.com/400x600?text=No+Cover';
                const isOnSale = book.promo_flag === true || book.promo_flag === "TRUE";

                return `
                <div class="book-card group cursor-pointer">
                    <div class="img-container relative book-aspect overflow-hidden rounded-md bg-gray-50 mb-4 shadow-sm">
                        <img src="${img}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy" alt="${title}">
                        ${isOnSale ? `
                            <div class="absolute top-3 left-0 bg-red-600 text-white text-[10px] font-black px-3 py-1 uppercase tracking-tighter shadow-lg">Sale</div>
                        ` : ''}
                    </div>
                    
                    <div class="space-y-1">
                        <p class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">${book.category || 'General'}</p>
                        <h3 class="text-sm font-bold leading-tight uppercase line-clamp-2 h-10 group-hover:text-blue-700 transition-colors">${title}</h3>
                        <p class="text-[11px] text-gray-500 font-medium italic">${author}</p>
                        
                        <div class="pt-3 flex items-center justify-between">
                            <div class="flex flex-col">
                                <span class="text-sm font-black fb-blue">₱${Number(price).toLocaleString()}</span>
                                ${isOnSale ? `<span class="text-[10px] text-gray-400 line-through">₱${Number(srp).toLocaleString()}</span>` : ''}
                            </div>
                            <button class="bg-white border-2 border-fb-blue text-fb-blue hover:bg-fb-blue hover:text-white p-2 rounded-full transition-all active:scale-90">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function searchBooks() {
            const query = document.getElementById('desktopSearch').value.toLowerCase();
            const filtered = allBooks.filter(b => 
                (b.title || '').toLowerCase().includes(query) || 
                (b.author || '').toLowerCase().includes(query) ||
                (b.category || '').toLowerCase().includes(query)
            );
            render(filtered);
        }

        init();
    </script>
</body>
</html>
