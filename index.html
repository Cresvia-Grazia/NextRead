<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fully Booked Clone | Premium Reservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9f9f9; }
        .fb-blue { color: #004f9f; }
        .bg-fb-blue { background-color: #004f9f; }
        .border-fb-blue { border-color: #004f9f; }
        
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Image ratio fix */
        .book-aspect { aspect-ratio: 2 / 3; }
        
        /* Hover shadow like the real site */
        .book-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.1); transform: translateY(-4px); }
    </style>
</head>
<body class="text-gray-900">

    <header class="hidden lg:block bg-white border-b sticky top-0 z-">
        <div class="max-w-[1440px] mx-auto px-8 py-5 flex items-center justify-between">
            <h1 class="text-3xl font- tracking-tighter fb-blue">FULLY BOOKED</h1>
            
            <div class="flex-grow max-w-2xl px-12">
                <div class="relative">
                    <input type="text" id="desktopSearch" onkeyup="searchBooks()" placeholder="Search by Title, Author, or ISBN..." 
                           class="w-full border-2 border-gray-100 py-2 px-11 rounded-sm focus:border-blue-500 outline-none transition-all text-sm">
                    <svg class="w-5 h-5 absolute left-3.5 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <div class="flex items-center gap-8 text-[11px] font-bold tracking-widest text-gray-500">
                <a href="#" class="hover:fb-blue">WISHLIST</a>
                <a href="#" class="hover:fb-blue">LOG IN / REGISTER</a>
                <div class="relative cursor-pointer">
                    <svg class="w-6 h-6 fb-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span class="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
                </div>
            </div>
        </div>
    </header>

    <header class="lg:hidden bg-white sticky top-0 z- border-b px-4 py-3">
        <div class="flex items-center justify-between mb-3">
            <h1 class="text-2xl font- tracking-tighter fb-blue">FULLY BOOKED</h1>
            <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </div>
        <div class="relative">
            <input type="text" id="mobileSearch" onkeyup="searchBooks()" placeholder="Search books..." 
                   class="w-full bg-gray-100 rounded-full py-2 px-10 text-sm focus:outline-none">
            <svg class="w-4 h-4 absolute left-4 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
    </header>

    <main class="max-w-[1440px] mx-auto px-4 lg:px-8 py-8">
        <div class="flex items-center justify-between mb-8 border-b border-gray-200 pb-4">
            <h2 class="text-xl lg:text-2xl font-black uppercase tracking-tight">Latest Arrivals</h2>
            <div id="item-count" class="text-xs font-bold text-gray-400 uppercase tracking-widest">Loading Items...</div>
        </div>

        <div id="book-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-x-4 gap-y-10 lg:gap-x-8 lg:gap-y-14">
            <div class="animate-pulse"><div class="book-aspect bg-gray-200 rounded mb-4"></div><div class="h-4 bg-gray-200 w-3/4 mb-2"></div><div class="h-4 bg-gray-200 w-1/2"></div></div>
            <div class="animate-pulse"><div class="book-aspect bg-gray-200 rounded mb-4"></div><div class="h-4 bg-gray-200 w-3/4 mb-2"></div><div class="h-4 bg-gray-200 w-1/2"></div></div>
        </div>
    </main>

    <footer class="lg:hidden fixed bottom-0 left-0 w-full bg-white border-t flex justify-around py-3 z- shadow-lg">
        <div class="flex flex-col items-center fb-blue">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[10px] font-bold mt-1">HOME</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <span class="text-[10px] font-bold mt-1 uppercase tracking-tighter">Search</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span class="text-[10px] font-bold mt-1 uppercase tracking-tighter">Reserve</span>
        </div>
    </footer>

    <script>
        // REPLACE WITH YOUR GOOGLE WEB APP URL
        const API_ENDPOINT = "YOUR_WEB_APP_URL";
        let allBooks = [];

        async function init() {
            try {
                const res = await fetch(API_ENDPOINT);
                allBooks = await res.json();
                render(allBooks);
            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('item-count').innerText = "CONNECTION ERROR";
            }
        }

        function render(data) {
            const grid = document.getElementById('book-grid');
            document.getElementById('item-count').innerText = `${data.length} ITEMS FOUND`;
            
            grid.innerHTML = data.map(book => {
                // Handle the Lowercase keys from our new Apps Script
                const title = book.title || 'Untitled';
                const author = book.author || 'Unknown';
                const price = parseFloat(book.price) || 0;
                const srp = parseFloat(book.srp) || 0;
                const img = book.cover_image_front_url || 'https://via.placeholder.com/300x450';
                const isPromo = String(book.promo_flag).toUpperCase() === "TRUE";

                return `
                <div class="book-card flex flex-col h-full bg-white transition-all duration-300 p-2 rounded-sm group">
                    <div class="relative book-aspect overflow-hidden mb-4 bg-gray-50">
                        <img src="${img}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" alt="${title}">
                        ${isPromo ? `<div class="absolute top-2 left-2 bg-red-600 text-white text-[10px] font-black px-2 py-1 italic uppercase tracking-tighter shadow-md">Sale</div>` : ''}
                    </div>
                    <div class="flex flex-col flex-grow">
                        <h3 class="text-[13px] font-black leading-[1.2] uppercase line-clamp-2 h-8 mb-1 group-hover:fb-blue transition-colors">${title}</h3>
                        <p class="text-[11px] text-gray-400 font-medium uppercase tracking-tighter mb-4 italic">${author}</p>
                        
                        <div class="mt-auto">
                            <div class="flex items-center gap-2 mb-4">
                                <span class="fb-blue font-black text-sm">₱${price.toLocaleString()}</span>
                                ${isPromo ? `<span class="text-[11px] text-gray-300 line-through">₱${srp.toLocaleString()}</span>` : ''}
                            </div>
                            <button class="w-full border-2 border-fb-blue text-fb-blue py-2.5 text-[10px] font-black uppercase tracking-widest hover:bg-fb-blue hover:text-white transition-all active:scale-95">
                                Reserve Now
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function searchBooks() {
            const query = (window.innerWidth >= 1024 ? 
                document.getElementById('desktopSearch').value : 
                document.getElementById('mobileSearch').value).toLowerCase();
            
            const filtered = allBooks.filter(b => 
                (b.title || '').toLowerCase().includes(query) || 
                (b.author || '').toLowerCase().includes(query)
            );
            render(filtered);
        }

        init();
    </script>
</body>
</html>
